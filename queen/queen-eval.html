<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="app-version" content="20260604a">
<title>HiveKeeper — Queen Spotter Eval</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --honey:#C8730A; --honey-l:#E8960C; --honey-pale:#FFF4DC;
    --forest:#162B1F; --forest-m:#243D2E; --forest-l:#3A6B4A;
    --cream:#FAF6EE; --warm:#F5EFE3; --white:#FFFDF8;
    --text:#1A1208; --text-m:#4A3A25; --text-l:#8A7A60;
    --red:#B83228; --green:#2A7A48;
    --r:16px; --rs:10px; --shadow-l:0 12px 40px rgba(26,18,8,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:linear-gradient(135deg,#0A1A0A 0%,#1a2d1a 50%,#0A1A0A 100%);background-attachment:fixed;
    color:var(--text);min-height:100dvh;font-family:'Syne',sans-serif;padding:env(safe-area-inset-top) 16px 40px}
  .wrap{max-width:760px;margin:0 auto}
  header{padding:30px 0 6px;text-align:center}
  h1{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;font-size:clamp(30px,7vw,46px);
    margin:.06em 0 .04em;color:var(--honey-pale)}
  .sub{font-family:'DM Mono',monospace;font-size:11.5px;color:#cdbd95cc;letter-spacing:.16em;text-transform:uppercase}
  .card{background:var(--cream);border-radius:var(--r);padding:18px;margin:18px 0;box-shadow:var(--shadow-l)}
  button{appearance:none;border:none;border-radius:var(--rs);padding:15px 20px;font-family:'Syne',sans-serif;
    font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;background:var(--honey);color:#fff;width:100%}
  button:hover:not(:disabled){background:var(--honey-l)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .tag{display:flex;gap:10px;align-items:center;margin-bottom:14px}
  .tag label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-l)}
  .tag input{flex:1;padding:11px 13px;border-radius:var(--rs);border:1px solid #d8c9a8;background:var(--white);font:inherit;font-size:14px}
  .summary{display:flex;align-items:center;gap:16px;padding:16px;border-radius:var(--r);background:var(--forest);margin-bottom:16px}
  .summary .big{font-family:'Syne';font-size:30px;font-weight:800;color:var(--honey-pale)}
  .summary .lab{font-family:'DM Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#cdbd95cc}
  .summary .txt{color:var(--honey-pale);font-size:14px;margin-top:2px}
  .case{display:flex;gap:14px;padding:14px;border:1px solid #e8ddc4;border-radius:var(--rs);margin-bottom:12px;background:var(--white)}
  .thumb{position:relative;width:130px;height:130px;flex:0 0 auto;border-radius:var(--rs);overflow:hidden;background:#000}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb svg{position:absolute;inset:0;width:100%;height:100%}
  .info{flex:1;min-width:0}
  .info .id{font-weight:700;font-size:15px}
  .info .desc{font-size:12.5px;color:var(--text-m);line-height:1.45;margin:3px 0 8px}
  .badge{display:inline-block;padding:3px 11px;border-radius:99px;font-family:'DM Mono',monospace;font-size:11px;
    font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-right:6px}
  .b-hit{background:#e3f0e3;color:var(--green);border:1px solid #b6d8b6}
  .b-miss{background:#f7e0de;color:var(--red);border:1px solid #e8b6b2}
  .b-na{background:var(--warm);color:var(--text-l);border:1px solid #e0d4ba}
  .b-info{background:var(--honey-pale);color:var(--honey);border:1px solid #e8cf9c}
  .detail{font-size:12px;color:var(--text-l);font-family:'DM Mono',monospace;margin-top:8px;line-height:1.5}
  .legend{font-family:'DM Mono',monospace;font-size:11px;color:#cdbd9590;text-align:center;margin-top:8px}
  .footer{text-align:center;font-family:'DM Mono',monospace;font-size:10.5px;color:#cdbd9580;margin-top:24px;letter-spacing:.1em}
  .results{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div style="font-size:28px">🐝</div>
    <h1>Queen Spotter Eval</h1>
    <div class="sub">measure builds against labelled truth</div>
  </header>

  <div class="card">
    <div class="tag">
      <label>run tag</label>
      <input type="text" id="runtag" placeholder="e.g. build-d" value="build-d">
    </div>
    <button id="run">Run eval (3 photos)</button>
    <div class="legend">hit = a candidate within 10% of the true queen · truth-unknown cases test over-claiming</div>
  </div>

  <div class="card results" id="results">
    <div class="summary">
      <div><div class="big" id="rate">–</div><div class="lab">hit rate</div></div>
      <div><div class="txt" id="rateNote"></div></div>
    </div>
    <div id="caseList"></div>
  </div>

  <div class="footer">HIVEKEEPER · QUEEN SPOTTER EVAL · build 20260604a</div>
</div>

function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function clamp01(n){ n=Number(n); if(isNaN(n))return 0; return Math.max(0,Math.min(1,n)); }

async function callWorker(b64){
  const res = await fetch(WORKER_URL, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ type:'frame_analysis', task:'queen_spotter', image: b64 })
  });
  const text = await res.text();
  if(!res.ok) throw new Error('HTTP '+res.status+': '+text.slice(0,160));
  return JSON.parse(text);
}

function scoreCase(c, result){
  const cands = Array.isArray(result.candidates) ? result.candidates : [];
  const out = { cands: cands.length, overall: result.overall_confidence, markedPred: result.marked, cs: cands };
  if(!c.truth){
    const overclaim = cands.length===1 && cands.some(x=>(x.confidence||0)>=0.6);
    out.hit = null; out.verdict = overclaim ? 'OVER-CLAIM' : 'ok (no truth)';
    out.cls = overclaim ? 'b-miss' : 'b-na';
    return out;
  }
  let best=null;
  cands.forEach((x,i)=>{ const d=dist(x,c.truth); if(best===null||d<best.d) best={i,d,x}; });
  if(!best){ out.hit=false; out.verdict='MISS (no candidates)'; out.cls='b-miss'; return out; }
  out.hit = best.d <= HIT_RADIUS;
  out.bestDist = best.d; out.bestRank = best.i+1; out.bestConf = best.x.confidence;
  if(out.hit) out.verdict = best.i===0 ? 'HIT (top)' : 'HIT (rank '+(best.i+1)+')';
  else out.verdict = 'MISS (closest '+best.d.toFixed(2)+' away)';
  out.cls = out.hit ? 'b-hit' : 'b-miss';
  if(c.marked!==undefined && c.marked!==null) out.markedCorrect = (result.marked===c.marked);
  return out;
}

function overlaySvg(c, sc){
  // truth (green ring) + candidates (honey/red dots) on the thumbnail
  let s = '<svg viewBox="0 0 100 100" preserveAspectRatio="none">';
  (sc.cs||[]).forEach((x,i)=>{
    const col = (sc.hit && sc.bestRank===i+1) ? '#2A7A48' : '#C8730A';
    s += `<circle cx="${clamp01(x.x)*100}" cy="${clamp01(x.y)*100}" r="4" fill="none" stroke="${col}" stroke-width="2"/>`;
  });
  if(c.truth){
    s += `<circle cx="${c.truth.x*100}" cy="${c.truth.y*100}" r="6" fill="none" stroke="#2A7A48" stroke-width="2.5" stroke-dasharray="3 2"/>`;
  }
  return s+'</svg>';
}

$('run').addEventListener('click', async ()=>{
  const btn=$('run'); btn.disabled=true; btn.textContent='Running…';
  $('results').style.display='none';
  const list=$('caseList'); list.innerHTML='';
  let hits=0, scorable=0;
  const history=[];

  for(const c of CASES){
    const wrap=document.createElement('div'); wrap.className='case';
    let result, sc, err=null;
    try{ result = await callWorker(c.b64); sc = scoreCase(c, result); }
    catch(e){ err = e.message||String(e); }

    if(err){
      wrap.innerHTML = `<div class="thumb"><img src="data:image/jpeg;base64,${c.b64}"></div>
        <div class="info"><div class="id">${esc(c.id)}</div>
        <div class="desc">${esc(c.desc)}</div>
        <span class="badge b-miss">ERROR</span><div class="detail">${esc(err)}</div></div>`;
      list.appendChild(wrap); continue;
    }

    if(sc.hit===true) hits++;
    if(sc.hit!==null) scorable++;
    history.push({case:c.id, hit:sc.hit, verdict:sc.verdict, overall:sc.overall});

    const ov = (typeof sc.overall==='number') ? Math.round(sc.overall*100)+'%' : '–';
    const reasons = (sc.cs||[]).map((x,i)=>`#${i+1} ${Math.round((x.confidence||0)*100)}% — ${esc(x.reason||'')}`).join('<br>');
    wrap.innerHTML = `
      <div class="thumb"><img src="data:image/jpeg;base64,${c.b64}">${overlaySvg(c,sc)}</div>
      <div class="info">
        <div class="id">${esc(c.id)}</div>
        <div class="desc">${esc(c.desc)}</div>
        <span class="badge ${sc.cls}">${esc(sc.verdict)}</span>
        <span class="badge b-info">overall ${ov}</span>
        <span class="badge b-info">${sc.cands} cand</span>
        <div class="detail">${reasons||'no candidates'}${c.truth?'<br>truth: '+c.truth.x+', '+c.truth.y:''}</div>
      </div>`;
    list.appendChild(wrap);
  }

  $('rate').textContent = scorable ? Math.round(100*hits/scorable)+'%' : 'n/a';
  $('rateNote').textContent = scorable
    ? `${hits} of ${scorable} scorable photos hit · tag “${$('runtag').value||'untagged'}”`
    : 'no scorable photos';
  $('results').style.display='block';
  console.log('EVAL RUN', $('runtag').value, JSON.stringify(history,null,2));
  btn.disabled=false; btn.textContent='Run eval (3 photos)';
});
</script>
